services:
  - type: web
    name: pq-crr-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pq-crr-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://pq-crr-frontend.onrender.com

  - type: web
    name: pq-crr-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: https://pq-crr-backend.onrender.com

databases:
  - name: pq-crr-db
    databaseName: pqcrr
    user: pqcrr
